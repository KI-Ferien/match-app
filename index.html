<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>KI-Ferien</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="space-background">
    <div id="milky-way"></div>
  </div>
  
  <svg id="magic-threads" preserveAspectRatio="none" aria-hidden="true"></svg>

  <main id="delphi-stage">
    
    <div id="zodiac-ring"></div>

    <div id="oracle-center">
      <div class="oracle-glass">
        <h1>Das Orakel</h1>
        
        <div id="chosen-signs" class="chosen-signs-container">
          <span id="signsPlaceholder" class="placeholder-text">Wähle die 2 Sternzeichen</span>
        </div>

        <div class="control-row">
          <label>Reisende (<span id="participantsVal">2</span>)</label>
          <input id="participants" type="range" min="1" max="12" value="2" />
        </div>

        <div class="control-row split">
          <div>
            <label>Erlebnis: <span id="vibeVal">Fließende Balance</span></label>
            <input id="vibe" type="range" min="1" max="5" value="3" />
          </div>
          <div>
            <label>Budget: <span id="budgetVal">Goldene Mitte</span></label>
            <input id="budget" type="range" min="1" max="5" value="3" />
          </div>
        </div>

        <div class="control-row split">
          <div>
            <label>Distanz: <span id="distanceVal">Kontinentale Weite</span></label>
            <input id="distance" type="range" min="1" max="5" value="3" />
          </div>
          <div>
            <label>Anreise: <span id="transportVal">Flug der Falken</span></label>
            <input id="transport" type="range" min="1" max="5" value="5" />
          </div>
        </div>

        <button id="askOrakel" class="primary">Orakel befragen</button>
        <div id="status" role="status" aria-live="polite"></div>
      </div>
    </div>

  </main>

  <script src="app.js" type="module"></script>
  <footer style="position: fixed; bottom: 15px; width: 100%; text-align: center; z-index: 100; font-size: 0.75rem; font-family: sans-serif;">
  <a href="impressum.html" style="color: rgba(212, 175, 55, 0.5); text-decoration: none; margin: 0 12px; transition: color 0.3s;" onmouseover="this.style.color='#d4af37'" onmouseout="this.style.color='rgba(212, 175, 55, 0.5)'">Impressum</a>
  <a href="datenschutz.html" style="color: rgba(212, 175, 55, 0.5); text-decoration: none; margin: 0 12px; transition: color 0.3s;" onmouseover="this.style.color='#d4af37'" onmouseout="this.style.color='rgba(212, 175, 55, 0.5)'">Datenschutz</a>
  <span style="color: rgba(255,255,255,0.2); margin-left: 10px;">&copy; 2026 KI-Ferien</span>
</footer>
</body>
</html>
