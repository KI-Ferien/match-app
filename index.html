<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KI-Ferien.de - Kosmisches Orakel</title>
    <style>
        :root {
            --gold: #d4af37;
            --cosmic-blue: #0a192f;
            --glass: rgba(255, 255, 255, 0.05);
            --circle-size: clamp(310px, 92vw, 620px);
            --ball-size: clamp(50px, 11vw, 85px);
            --rotation-speed: 160s;
        }

        body {
            margin: 0; padding: 0;
            background: #05060f;
            color: white; font-family: 'Optima', 'Segoe UI', serif;
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; overflow-x: hidden;
        }

        /* KOSMISCHE VISUALS */
        #space-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -3; }
        .milky-way {
            position: fixed; top: 50%; left: 50%; width: 150vmax; height: 150vmax;
            background: radial-gradient(circle at center, rgba(142, 108, 246, 0.1) 0%, rgba(0, 92, 151, 0.05) 30%, transparent 70%);
            transform: translate(-50%, -50%); z-index: -2; pointer-events: none; filter: blur(80px);
        }
        #magic-threads { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        .hero { text-align: center; padding: 10px 20px; z-index: 10; }
        h1 { font-size: clamp(1.4rem, 5vw, 2.8rem); color: var(--gold); margin: 5px 0; text-shadow: 0 0 20px rgba(212,175,55,0.4); letter-spacing: 2px; }

        .briefing-text {
            max-width: 500px; text-align: center; font-style: italic;
            color: rgba(255, 255, 255, 0.6); font-size: clamp(0.75rem, 1.8vw, 0.95rem);
            margin-bottom: 10px; padding: 0 20px; line-height: 1.4; z-index: 10;
        }

        /* ORAKEL SYSTEM */
        .oracle-container {
            position: relative; width: var(--circle-size); height: var(--circle-size);
            margin: 5px auto; display: flex; align-items: center; justify-content: center;
        }

        #zodiac-wrapper {
            position: absolute; width: 100%; height: 100%;
            animation: rotate-ring var(--rotation-speed) linear infinite;
        }

        /* DER ZENTRALE HUB - Optimiert für Mobile */
        .central-hub {
            width: 66%; height: 66%;
            background: rgba(10, 25, 47, 0.88);
            backdrop-filter: blur(20px); border-radius: 50%;
            border: 1px solid rgba(212, 175, 55, 0.3);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: clamp(12px, 3.5vw, 35px); box-sizing: border-box; z-index: 5;
            box-shadow: 0 0 50px rgba(0,0,0,0.9), inset 0 0 30px rgba(212,175,55,0.1);
        }

        .slider-area { width: 100%; display: flex; flex-direction: column; gap: clamp(4px, 1vh, 10px); }
        .slider-group { width: 100%; }
        .slider-label { font-size: clamp(0.6rem, 1.5vw, 0.75rem); color: var(--gold); display: flex; justify-content: space-between; text-transform: uppercase; letter-spacing: 1px; }
        .slider-val { color: white; font-weight: bold; }
        input[type=range] { width: 100%; margin: 4px 0; cursor: pointer; accent-color: var(--gold); height: 14px; }

        .oracle-btn {
            background: var(--gold); color: black; border: none; 
            padding: clamp(8px, 2vw, 12px) clamp(15px, 4vw, 25px); 
            border-radius: 30px; font-weight: bold;
            cursor: pointer; margin-top: clamp(8px, 2vh, 15px); 
            font-size: clamp(0.75rem, 2vw, 1.1rem);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); transition: 0.3s;
        }

        /* ZODIAC BALLS */
        .zodiac-ball {
            position: absolute; width: var(--ball-size); height: var(--ball-size);
            background: rgba(0,0,0,0.85); border: 1.5px solid var(--gold); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 6; 
            animation: counter-rotate var(--rotation-speed) linear infinite;
        }
        
        .zodiac-ball span { 
            line-height: 1.1; text-align: center; font-size: clamp(0.55rem, 1.8vw, 0.75rem); 
            display: block; width: 100%; color: white; pointer-events: none;
        }

        .zodiac-ball.selected { background: var(--gold); border-color: white; box-shadow: 0 0 25px var(--gold); }
        .zodiac-ball.selected span { color: black; font-weight: bold; }

        /* ANIMATIONEN */
        @keyframes rotate-ring { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes counter-rotate { 
            from { transform: translate(-50%, -50%) rotate(0deg); } 
            to { transform: translate(-50%, -50%) rotate(-360deg); } 
        }

        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 3s infinite ease-in-out; }
        @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.8; } }

        @keyframes snake {
            0% { stroke-dashoffset: 400; opacity: 0; }
            20% { opacity: 0.4; }
            80% { opacity: 0.4; }
            100% { stroke-dashoffset: 0; opacity: 0; }
        }
        .snaking-thread { fill: none; stroke-dasharray: 200; animation: snake linear infinite; }

        footer { margin-top: auto; padding: 15px; width: 100%; text-align: center; background: rgba(0,0,0,0.4); border-top: 1px solid rgba(255,255,255,0.05); }
        footer a { color: rgba(255,255,255,0.5); text-decoration: none; margin: 0 10px; font-size: 0.75rem; }
    </style>
</head>
<body>

<div id="space-canvas"></div>
<div class="milky-way"></div>
<svg id="magic-threads" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>

<div class="hero"><h1>KI-FERIEN ORAKEL</h1></div>

<div class="briefing-text">
    Wähle die Zeichen Deiner Bestimmung und justiere die Regler Deines Schicksals.
</div>

<div class="oracle-container">
    <div id="zodiac-wrapper"></div>
    <div class="central-hub">
        <div class="slider-area">
            <div class="slider-group">
                <div class="slider-label">Gefährten <span class="slider-val" id="val-p">2</span></div>
                <input type="range" id="participants" min="1" max="5" value="2" oninput="handleParticipantChange(this.value)">
            </div>
            <div class="slider-group">
                <div class="slider-label">Vibe <span class="slider-val" id="val-v">Fließende Balance</span></div>
                <input type="range" id="vibe-slider" min="1" max="3" value="2" oninput="updateVibe(this.value)">
            </div>
            <div class="slider-group">
                <div class="slider-label">Budget-Pfad <span class="slider-val" id="val-b">Goldene Mitte</span></div>
                <input type="range" id="budget-slider" min="1" max="3" value="2" oninput="updateBudget(this.value)">
            </div>
            <div class="slider-group">
                <div class="slider-label">Distanz <span class="slider-val" id="val-d">Nachbarreiche</span></div>
                <input type="range" id="distance-slider" min="1" max="4" value="2" oninput="updateDistance(this.value)">
            </div>
        </div>
        <button class="oracle-btn" id="ask-oracle">BEFRAGEN</button>
    </div>
</div>

<div id="status" style="margin-top: 10px; color: var(--gold); font-size: 0.8rem; height: 1.2rem; z-index: 10; text-align: center;"></div>

<footer><a href="impressum.html">Impressum</a><a href="datenschutz.html">Datenschutz</a></footer>

<script>
    const vibeNamen = ["Stille Einkehr", "Fließende Balance", "Abenteuerliche Ekstase"];
    const budgetNamen = ["Bescheidene Genügsamkeit", "Goldene Mitte", "Königlicher Luxus"];
    const distanzNamen = ["Heimatliche Gefilde", "Nachbarreiche", "Kontinentale Weite", "Ans Ende der Welt"];

    let selectedSigns = [];
    let maxSigns = 2;

    function handleParticipantChange(v) {
        maxSigns = parseInt(v);
        document.getElementById('val-p').innerText = v;
        while (selectedSigns.length > maxSigns) {
            const removedName = selectedSigns.shift();
            document.querySelectorAll('.zodiac-ball').forEach(b => {
                if (b.dataset.name === removedName) b.classList.remove('selected');
            });
        }
        updateStatusText();
    }

    function updateVibe(v) { document.getElementById('val-v').innerText = vibeNamen[v-1]; }
    function updateBudget(v) { document.getElementById('val-b').innerText = budgetNamen[v-1]; }
    function updateDistance(v) { document.getElementById('val-d').innerText = distanzNamen[v-1]; }

    function updateStatusText() {
        const status = document.getElementById('status');
        const diff = maxSigns - selectedSigns.length;
        status.innerText = diff > 0 ? `Wähle noch ${diff} Zeichen.` : "Schicksal bereit.";
    }

    document.addEventListener('DOMContentLoaded', () => {
        initCosmos();
        const wrapper = document.getElementById('zodiac-wrapper');
        const askButton = document.getElementById('ask-oracle');

        const signs = [
            { name: 'Widder', icon: '♈' }, { name: 'Stier', icon: '♉' }, { name: 'Zwillinge', icon: '♊' }, { name: 'Krebs', icon: '♋' },
            { name: 'Löwe', icon: '♌' }, { name: 'Jungfrau', icon: '♍' }, { name: 'Waage', icon: '♎' }, { name: 'Skorpion', icon: '♏' },
            { name: 'Schütze', icon: '♐' }, { name: 'Steinbock', icon: '♑' }, { name: 'Wassermann', icon: '♒' }, { name: 'Fische', icon: '♓' }
        ];

        signs.forEach((sign, index) => {
            const ball = document.createElement('div');
            ball.className = 'zodiac-ball';
            ball.dataset.name = sign.name;
            ball.innerHTML = `<span><b style="font-size:1.2rem">${sign.icon}</b><br>${sign.name}</span>`;
            
            const angle = (index / signs.length) * 2 * Math.PI - Math.PI / 2;
            const radius = 43.5; // Leicht erhöht für mehr Abstand zum Hub
            const x = 50 + radius * Math.cos(angle);
            const y = 50 + radius * Math.sin(angle);
            ball.style.left = `${x}%`;
            ball.style.top = `${y}%`;

            ball.onclick = () => {
                if (ball.classList.contains('selected')) {
                    ball.classList.remove('selected');
                    selectedSigns = selectedSigns.filter(s => s !== sign.name);
                } else {
                    if (selectedSigns.length >= maxSigns) {
                        const oldest = selectedSigns.shift();
                        document.querySelectorAll('.zodiac-ball').forEach(b => {
                            if(b.dataset.name === oldest) b.classList.remove('selected');
                        });
                    }
                    ball.classList.add('selected');
                    selectedSigns.push(sign.name);
                }
                updateStatusText();
            };
            wrapper.appendChild(ball);
        });
        updateStatusText();

        askButton.onclick = async () => {
            if (selectedSigns.length === 0) return;
            askButton.innerText = "LESEN...";
            const payload = {
                signs: selectedSigns, participants: maxSigns,
                vibe: vibeNamen[document.getElementById('vibe-slider').value - 1],
                budget: budgetNamen[document.getElementById('budget-slider').value - 1],
                distance: distanzNamen[document.getElementById('distance-slider').value - 1]
            };
            try {
                const response = await fetch('/api/match', { method: 'POST', body: JSON.stringify(payload) });
                const result = await response.json();
                sessionStorage.setItem('orakelResult', JSON.stringify({ result }));
                window.location.href = 'reise.html';
            } catch (e) { askButton.innerText = "BEFRAGEN"; }
        };
    });

    function initCosmos() {
        const canvas = document.getElementById('space-canvas');
        for(let i=0; i<80; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2;
            star.style.width = size + 'px'; star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%'; star.style.top = Math.random() * 100 + '%';
            canvas.appendChild(star);
        }
        const svg = document.getElementById('magic-threads');
        let paths = '';
        for(let i=0; i<12; i++) {
            const d = `M ${Math.random()*100} -10 C ${Math.random()*100} ${Math.random()*100}, ${Math.random()*100} ${Math.random()*100}, ${Math.random()*100} 110`;
            paths += `<path class="snaking-thread" d="${d}" stroke="rgba(212,175,55,0.3)" stroke-width="0.1" style="animation-duration: ${40+Math.random()*30}s;" />`;
        }
        svg.innerHTML = paths;
    }
</script>
</body>
</html>
