<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KI-Ferien.de - Dein Orakel</title>
    <style>
        :root {
            --gold: #d4af37;
            --ocean: #0a192f;
            --glass: rgba(255, 255, 255, 0.08);
            --circle-size: clamp(300px, 85vw, 550px);
            --ball-size: clamp(55px, 12vw, 80px);
            --rotation-speed: 120s; /* Sehr sanft */
        }

        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle at center, #16213e 0%, #0a0b1e 100%);
            color: white; font-family: 'Segoe UI', sans-serif;
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; overflow-x: hidden;
        }

        .hero { text-align: center; padding: 15px; z-index: 10; }
        h1 { font-size: clamp(1.4rem, 5vw, 2.2rem); color: var(--gold); margin: 5px 0; text-shadow: 0 0 15px rgba(212,175,55,0.3); }

        /* DER MAGISCHE KREIS */
        .oracle-container {
            position: relative;
            width: var(--circle-size);
            height: var(--circle-size);
            margin: 10px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Rotierender Wrapper für die Sternzeichen */
        #zodiac-wrapper {
            position: absolute;
            width: 100%;
            height: 100%;
            animation: rotate-ring var(--rotation-speed) linear infinite;
            pointer-events: none; /* Klicks gehen durch den Wrapper zu den Bällen */
        }

        /* Die Mitte: Das Briefing (Bleibt statisch!) */
        .central-hub {
            width: 65%; height: 65%;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border-radius: 50%;
            border: 1px solid rgba(212, 175, 55, 0.3);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 15px; box-sizing: border-box;
            z-index: 5; text-align: center;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5), 0 0 20px rgba(0,0,0,0.3);
        }

        .config-area { width: 100%; display: flex; flex-direction: column; gap: 4px; }
        
        select {
            background: #1a1a1a; color: white; border: 1px solid #444;
            padding: 6px; border-radius: 8px; font-size: 0.8rem;
            width: 100%; cursor: pointer;
        }

        label { font-size: 0.65rem; color: var(--gold); margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }

        .oracle-btn {
            background: var(--gold); border: none; padding: 10px 20px;
            border-radius: 25px; font-weight: bold; cursor: pointer;
            margin-top: 12px; font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        .oracle-btn:hover { box-shadow: 0 0 15px var(--gold); transform: scale(1.05); }

        /* Die Satelliten (Zodiac Balls) */
        .zodiac-ball {
            position: absolute;
            width: var(--ball-size); height: var(--ball-size);
            background: rgba(0,0,0,0.8);
            border: 1px solid var(--gold); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: background 0.3s, box-shadow 0.3s;
            font-size: 0.7rem; text-align: center;
            z-index: 6; pointer-events: auto; /* Wieder klickbar machen */
            /* Gegenrotation, damit Icons aufrecht bleiben */
            animation: counter-rotate var(--rotation-speed) linear infinite;
        }
        
        .zodiac-ball.selected {
            background: var(--gold); color: black;
            box-shadow: 0 0 25px var(--gold);
        }

        /* ANIMATIONEN */
        @keyframes rotate-ring {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes counter-rotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(-360deg); }
        }

        footer {
            margin-top: auto; padding: 15px; width: 100%;
            text-align: center; background: rgba(0,0,0,0.4);
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        footer a { color: rgba(255,255,255,0.5); text-decoration: none; margin: 0 10px; font-size: 0.75rem; }
    </style>
</head>
<body>

<div class="hero">
    <h1>KI-FERIEN ORAKEL</h1>
</div>

<div class="oracle-container">
    <div id="zodiac-wrapper"></div> <div class="central-hub">
        <div class="config-area">
            <label>Gefährten</label>
            <select id="participants">
                <option value="1">1 Person</option>
                <option value="2" selected>2 Personen</option>
                <option value="3">3 Personen</option>
                <option value="4">4 Personen</option>
                <option value="5">Karawane (5+)</option>
            </select>
            
            <label>Distanz</label>
            <select id="distance">
                <option>Heimatliche Gefilde</option>
                <option selected>Nachbarreiche</option>
                <option>Kontinentale Weite</option>
                <option>Ans Ende der Welt</option>
            </select>
        </div>
        <button class="oracle-btn" id="ask-oracle">BEFRAGEN</button>
    </div>
</div>

<div id="status">Berühre die Zeichen Deiner Bestimmung</div>

<footer>
    <a href="impressum.html">Impressum</a>
    <a href="datenschutz.html">Datenschutz</a>
    <p style="font-size: 0.6rem; color: #444; margin-top: 8px;">&copy; 2026 KI-Ferien.de</p>
</footer>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const wrapper = document.getElementById('zodiac-wrapper');
        const status = document.getElementById('status');
        const askButton = document.getElementById('ask-oracle');

        const signs = [
            { name: 'Widder', icon: '♈' }, { name: 'Stier', icon: '♉' },
            { name: 'Zwillinge', icon: '♊' }, { name: 'Krebs', icon: '♋' },
            { name: 'Löwe', icon: '♌' }, { name: 'Jungfrau', icon: '♍' },
            { name: 'Waage', icon: '♎' }, { name: 'Skorpion', icon: '♏' },
            { name: 'Schütze', icon: '♐' }, { name: 'Steinbock', icon: '♑' },
            { name: 'Wassermann', icon: '♒' }, { name: 'Fische', icon: '♓' }
        ];

        let selectedSigns = [];

        signs.forEach((sign, index) => {
            const ball = document.createElement('div');
            ball.className = 'zodiac-ball';
            ball.innerHTML = `<span><b style="font-size:1.2rem">${sign.icon}</b><br><small>${sign.name}</small></span>`;
            
            const angle = (index / signs.length) * 2 * Math.PI - Math.PI / 2;
            const radius = 43; 
            const x = 50 + radius * Math.cos(angle);
            const y = 50 + radius * Math.sin(angle);
            
            ball.style.left = `${x}%`;
            ball.style.top = `${y}%`;
            // transform wird jetzt über CSS Animation gesteuert!

            ball.onclick = () => {
                ball.classList.toggle('selected');
                if (ball.classList.contains('selected')) {
                    selectedSigns.push(sign.name);
                } else {
                    selectedSigns = selectedSigns.filter(s => s !== sign.name);
                }
            };
            wrapper.appendChild(ball);
        });

        askButton.onclick = async () => {
            if (selectedSigns.length === 0) {
                status.textContent = "Wähle Deine Zeichen!";
                return;
            }

            const payload = {
                signs: selectedSigns,
                participants: document.getElementById('participants').value,
                distance: document.getElementById('distance').value,
                vibe: "Fließende Balance",
                budget: "Goldene Mitte",
                transport: "Gefährten der Straße"
            };

            status.textContent = "Die Sterne ordnen sich...";
            askButton.disabled = true;

            try {
                const response = await fetch('/api/match', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                sessionStorage.setItem('orakelResult', JSON.stringify({ result }));
                window.location.href = 'reise.html';
            } catch (e) {
                status.textContent = "Verbindung unterbrochen.";
                askButton.disabled = false;
            }
        };
    });
</script>
</body>
</html>
