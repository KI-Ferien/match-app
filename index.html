<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KI-Ferien.de - Kosmisches Orakel</title>
    <style>
        :root {
            --gold: #d4af37;
            --cosmic-blue: #0a192f;
            --circle-size: clamp(310px, 92vw, 620px);
            --ball-size: clamp(65px, 13vw, 95px);
            --rotation-speed: 160s;
        }

        body {
            margin: 0; padding: 0; background: #05060f; color: white; 
            font-family: 'Optima', 'Segoe UI', serif; min-height: 100vh; 
            display: flex; flex-direction: column; align-items: center; overflow-x: hidden;
        }

        #space-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -3; }
        .milky-way {
            position: fixed; top: 50%; left: 50%; width: 150vmax; height: 150vmax;
            background: radial-gradient(circle at center, rgba(142, 108, 246, 0.1) 0%, rgba(0, 92, 151, 0.05) 30%, transparent 70%);
            transform: translate(-50%, -50%); z-index: -2; pointer-events: none; filter: blur(80px);
        }

        .hero { text-align: center; padding: 10px 20px; z-index: 10; }
        h1 { font-size: clamp(1.4rem, 5vw, 2.8rem); color: var(--gold); margin: 5px 0; letter-spacing: 2px; }
        .briefing-text { color: rgba(255, 255, 255, 0.6); font-style: italic; z-index: 10; margin-bottom: 10px; text-align: center;}

        .oracle-container {
            position: relative; width: var(--circle-size); height: var(--circle-size);
            margin: 5px auto; display: flex; align-items: center; justify-content: center;
        }
        #zodiac-wrapper { position: absolute; width: 100%; height: 100%; animation: rotate-ring var(--rotation-speed) linear infinite; }

        .central-hub {
            width: 66%; height: 66%; background: rgba(10, 25, 47, 0.9);
            backdrop-filter: blur(20px); border-radius: 50%; border: 1px solid rgba(212, 175, 55, 0.3);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: clamp(12px, 3vw, 35px); box-sizing: border-box; z-index: 5;
        }

        .slider-area { width: 100%; display: flex; flex-direction: column; gap: 8px; }
        .slider-group { width: 100%; }
        .slider-label { font-size: 0.75rem; color: var(--gold); display: flex; justify-content: space-between; text-transform: uppercase; }
        .slider-val { color: white; font-weight: bold; }
        
        .stepper-container { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 5px 0 10px 0; }
        .stepper-btn {
            background: rgba(212, 175, 55, 0.2); border: 1px solid var(--gold); color: var(--gold); 
            width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-weight: bold; 
            display: flex; align-items: center; justify-content: center;
        }
        #val-p { font-size: 1.3rem; color: white; min-width: 20px; text-align: center; }

        input[type=range] { width: 100%; margin: 4px 0; cursor: pointer; accent-color: var(--gold); }

        .oracle-btn {
            background: var(--gold); color: black; border: none; padding: 12px 25px; 
            border-radius: 30px; font-weight: bold; cursor: pointer; margin-top: 15px;
        }

        .zodiac-ball {
            position: absolute; width: var(--ball-size); height: var(--ball-size);
            background: rgba(0,0,0,0.85); border: 1.5px solid var(--gold); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer; 
            z-index: 6; animation: counter-rotate var(--rotation-speed) linear infinite;
        }
        .zodiac-ball span { line-height: 1.2; text-align: center; font-size: 0.7rem; color: white; pointer-events: none; }
        .zodiac-ball.selected { background: var(--gold); border-color: white; }
        .zodiac-ball.selected span { color: black; font-weight: bold; }

        @keyframes rotate-ring { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes counter-rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(-360deg); } }

        #status { margin-top: 10px; color: var(--gold); font-size: 0.8rem; z-index: 10; }
        footer { margin-top: auto; padding: 15px; text-align: center; }
        footer a { color: rgba(255,255,255,0.4); text-decoration: none; margin: 0 10px; font-size: 0.75rem; }
    </style>
</head>
<body>

<div id="space-canvas"></div><div class="milky-way"></div>
<div class="hero"><h1>KI-FERIEN ORAKEL</h1></div>
<div class="briefing-text">Wähle die Zeichen Deiner Bestimmung.</div>

<div class="oracle-container">
    <div id="zodiac-wrapper"></div>
    <div class="central-hub">
        <div class="slider-area">
            <div class="slider-group">
                <div class="slider-label" style="justify-content: center;">Gefährten</div>
                <div class="stepper-container">
                    <button class="stepper-btn" onclick="changeParticipants(-1)">−</button>
                    <span id="val-p">2</span>
                    <button class="stepper-btn" onclick="changeParticipants(1)">+</button>
                </div>
            </div>
            <div class="slider-group">
                <div class="slider-label">Vibe <span class="slider-val" id="val-v">Fließende Balance</span></div>
                <input type="range" id="vibe-slider" min="1" max="3" value="2" oninput="updateVibe(this.value)">
            </div>
            <div class="slider-group">
                <div class="slider-label">Budget <span class="slider-val" id="val-b">Goldene Mitte</span></div>
                <input type="range" id="budget-slider" min="1" max="3" value="2" oninput="updateBudget(this.value)">
            </div>
            <div class="slider-group">
                <div class="slider-label">Distanz <span class="slider-val" id="val-d">Nachbarreiche</span></div>
                <input type="range" id="distance-slider" min="1" max="4" value="2" oninput="updateDistance(this.value)">
            </div>
        </div>
        <button class="oracle-btn" id="ask-oracle">BEFRAGEN</button>
    </div>
</div>

<div id="status">Wähle noch 2 Zeichen.</div>
<footer><a href="impressum.html">Impressum</a><a href="datenschutz.html">Datenschutz</a></footer>

<script>
    const vibeNamen = ["Stille Einkehr", "Fließende Balance", "Abenteuerliche Ekstase"];
    const budgetNamen = ["Bescheidene Genügsamkeit", "Goldene Mitte", "Königlicher Luxus"];
    const distanzNamen = ["Heimatliche Gefilde", "Nachbarreiche", "Kontinentale Weite", "Ans Ende der Welt"];

    let selectedSigns = [];
    let maxSigns = 2;

    function changeParticipants(delta) {
        let newVal = maxSigns + delta;
        if (newVal >= 1 && newVal <= 5) {
            maxSigns = newVal;
            document.getElementById('val-p').innerText = maxSigns;
            while (selectedSigns.length > maxSigns) {
                const removedName = selectedSigns.shift();
                document.querySelectorAll('.zodiac-ball').forEach(b => {
                    if (b.dataset.name === removedName) b.classList.remove('selected');
                });
            }
            updateStatusText();
        }
    }

    function updateVibe(v) { document.getElementById('val-v').innerText = vibeNamen[v-1]; }
    function updateBudget(v) { document.getElementById('val-b').innerText = budgetNamen[v-1]; }
    function updateDistance(v) { document.getElementById('val-d').innerText = distanzNamen[v-1]; }

    function updateStatusText() {
        const diff = maxSigns - selectedSigns.length;
        document.getElementById('status').innerText = diff > 0 ? `Wähle noch ${diff} Zeichen.` : "Schicksal bereit.";
    }

    document.addEventListener('DOMContentLoaded', () => {
        const wrapper = document.getElementById('zodiac-wrapper');
        const askButton = document.getElementById('ask-oracle');

        const signs = [
            { name: 'Widder', icon: '♈', date: '21.03.–19.04.' }, { name: 'Stier', icon: '♉', date: '20.04.–20.05.' }, 
            { name: 'Zwillinge', icon: '♊', date: '21.05.–21.06.' }, { name: 'Krebs', icon: '♋', date: '22.06.–22.07.' },
            { name: 'Löwe', icon: '♌', date: '23.07.–22.08.' }, { name: 'Jungfrau', icon: '♍', date: '23.08.–22.09.' }, 
            { name: 'Waage', icon: '♎', date: '23.09.–23.10.' }, { name: 'Skorpion', icon: '♏', date: '24.10.–22.11.' },
            { name: 'Schütze', icon: '♐', date: '23.11.–21.12.' }, { name: 'Steinbock', icon: '♑', date: '22.12.–19.01.' }, 
            { name: 'Wassermann', icon: '♒', date: '20.01.–18.02.' }, { name: 'Fische', icon: '♓', date: '19.02.–20.03.' }
        ];

        signs.forEach((sign, index) => {
            const ball = document.createElement('div');
            ball.className = 'zodiac-ball';
            ball.dataset.name = sign.name;
            ball.innerHTML = `<span><b style="font-size:1.2rem">${sign.icon}</b><br><b>${sign.name}</b><br><span style="font-size:0.55rem; opacity:0.6;">${sign.date}</span></span>`;
            
            const angle = (index / signs.length) * 2 * Math.PI - Math.PI / 2;
            const radius = 43.5; 
            ball.style.left = `${50 + radius * Math.cos(angle)}%`;
            ball.style.top = `${50 + radius * Math.sin(angle)}%`;

            ball.onclick = () => {
                if (ball.classList.contains('selected')) {
                    ball.classList.remove('selected');
                    selectedSigns = selectedSigns.filter(s => s !== sign.name);
                } else {
                    if (selectedSigns.length >= maxSigns) {
                        const oldest = selectedSigns.shift();
                        document.querySelectorAll('.zodiac-ball').forEach(b => {
                            if(b.dataset.name === oldest) b.classList.remove('selected');
                        });
                    }
                    ball.classList.add('selected');
                    selectedSigns.push(sign.name);
                }
                updateStatusText();
            };
            wrapper.appendChild(ball);
        });

        askButton.onclick = async () => {
            if (selectedSigns.length === 0) return;
            askButton.innerText = "LESEN...";
            
            const payload = {
                signs: selectedSigns, participants: maxSigns,
                vibe: vibeNamen[document.getElementById('vibe-slider').value - 1],
                budget: budgetNamen[document.getElementById('budget-slider').value - 1],
                distance: distanzNamen[document.getElementById('distance-slider').value - 1]
            };
            
            try {
                // HIER IST DER ENTSCHEIDENDE PFAD FÜR NETLIFY!
                const response = await fetch('/.netlify/functions/match', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload) 
                });
                
                if (!response.ok) throw new Error("API Antwort fehlerhaft");
                
                const result = await response.json();
                sessionStorage.setItem('orakelResult', JSON.stringify(result));
                window.location.href = 'reise.html';
            } catch (e) { 
                console.error("Fetch-Fehler:", e);
                askButton.innerText = "FEHLER - NEU VERSUCHEN"; 
            }
        };
    });
</script>
</body>
</html>
