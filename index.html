<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KI-Ferien.de - Kosmisches Orakel</title>
    <style>
        :root {
            --gold: #d4af37;
            --cosmic-blue: #0a192f;
            --glass: rgba(255, 255, 255, 0.05);
            --circle-size: clamp(320px, 85vw, 620px);
            --ball-size: clamp(55px, 12vw, 85px);
            --rotation-speed: 160s;
        }

        body {
            margin: 0; padding: 0;
            background: #05060f;
            color: white; font-family: 'Optima', 'Segoe UI', serif;
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; overflow-x: hidden;
        }

        /* VISUELLE EFFEKTE HINTERGRUND */
        #space-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -3; }
        
        .milky-way {
            position: fixed; top: 50%; left: 50%; width: 150vmax; height: 150vmax;
            background: radial-gradient(circle at center, rgba(142, 108, 246, 0.1) 0%, rgba(0, 92, 151, 0.05) 30%, transparent 70%);
            transform: translate(-50%, -50%); z-index: -2; pointer-events: none; filter: blur(80px);
        }

        #magic-threads { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        .hero { text-align: center; padding: 20px; z-index: 10; }
        h1 { font-size: clamp(1.6rem, 5vw, 2.8rem); color: var(--gold); margin: 10px 0; text-shadow: 0 0 20px rgba(212,175,55,0.4); letter-spacing: 3px; }

        .briefing-text {
            max-width: 500px; text-align: center; font-style: italic;
            color: rgba(255, 255, 255, 0.7); font-size: clamp(0.8rem, 2vw, 1rem);
            margin-bottom: 20px; padding: 0 20px; line-height: 1.5; z-index: 10;
        }

        /* DAS ORAKEL SYSTEM */
        .oracle-container {
            position: relative; width: var(--circle-size); height: var(--circle-size);
            margin: 10px auto; display: flex; align-items: center; justify-content: center;
        }

        #zodiac-wrapper {
            position: absolute; width: 100%; height: 100%;
            animation: rotate-ring var(--rotation-speed) linear infinite;
        }

        .central-hub {
            width: 70%; height: 70%;
            background: rgba(10, 25, 47, 0.8);
            backdrop-filter: blur(25px); border-radius: 50%;
            border: 1px solid rgba(212, 175, 55, 0.25);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: clamp(15px, 4vw, 35px); box-sizing: border-box; z-index: 5;
            box-shadow: 0 0 50px rgba(0,0,0,0.9), inset 0 0 30px rgba(212,175,55,0.1);
        }

        .slider-area { width: 100%; display: flex; flex-direction: column; gap: 8px; }
        .slider-group { width: 100%; }
        .slider-label { font-size: 0.7rem; color: var(--gold); display: flex; justify-content: space-between; text-transform: uppercase; letter-spacing: 1px; }
        .slider-val { color: white; font-weight: bold; }
        
        input[type=range] { width: 100%; margin: 6px 0; cursor: pointer; accent-color: var(--gold); }

        .oracle-btn {
            background: var(--gold); color: black; border: none; 
            padding: 12px 25px; border-radius: 30px; font-weight: bold;
            cursor: pointer; margin-top: 15px; font-size: clamp(0.8rem, 2.5vw, 1.1rem);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); transition: 0.3s;
        }

        /* ZODIAC BALLS MIT FIXIERTER SCHRIFT */
        .zodiac-ball {
            position: absolute; width: var(--ball-size); height: var(--ball-size);
            background: rgba(0,0,0,0.85); border: 1.5px solid var(--gold); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 6; 
            /* REPARATUR: Gegenrotation der Kugel selbst */
            animation: counter-rotate var(--rotation-speed) linear infinite;
        }
        
        .zodiac-ball span { 
            line-height: 1.2; text-align: center; font-size: clamp(0.6rem, 2vw, 0.75rem); 
            display: block; width: 100%; color: white;
        }

        .zodiac-ball.selected {
            background: var(--gold); 
            box-shadow: 0 0 25px var(--gold);
        }
        .zodiac-ball.selected span { color: black; font-weight: bold; }

        /* ANIMATIONEN */
        @keyframes rotate-ring { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes counter-rotate { 
            /* Hier wird die Kugel positioniert UND die Rotation der Schrift neutralisiert */
            from { transform: translate(-50%, -50%) rotate(0deg); } 
            to { transform: translate(-50%, -50%) rotate(-360deg); } 
        }

        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 3s infinite ease-in-out; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        @keyframes snake {
            0% { stroke-dashoffset: 400; opacity: 0; }
            20% { opacity: 0.6; }
            80% { opacity: 0.6; }
            100% { stroke-dashoffset: 0; opacity: 0; }
        }
        .snaking-thread { fill: none; stroke-dasharray: 200; animation: snake linear infinite; }

        footer { margin-top: auto; padding: 20px; width: 100%; text-align: center; background: rgba(0,0,0,0.4); border-top: 1px solid rgba(255,255,255,0.05); }
        footer a { color: rgba(255,255,255,0.5); text-decoration: none; margin: 0 15px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div id="space-canvas"></div>
<div class="milky-way"></div>
<svg id="magic-threads" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>

<div class="hero"><h1>KI-FERIEN ORAKEL</h1></div>

<div class="briefing-text">
    Wähle die Zeichen Deiner Bestimmung und justiere die Regler Deines Schicksals, um die perfekten Ferien zu offenbaren.
</div>

<div class="oracle-container">
    <div id="zodiac-wrapper"></div>
    <div class="central-hub">
        <div class="slider-area">
            <div class="slider-group">
                <div class="slider-label">Gefährten <span class="slider-val" id="val-p">2</span></div>
                <input type="range" id="participants" min="1" max="5" value="2" oninput="document.getElementById('val-p').innerText=this.value">
            </div>
            <div class="slider-group"><div class="slider-label">Vibe <span class="slider-val" id="val-v">Balance</span></div><input type="range" id="vibe-slider" min="1" max="3" value="2" oninput="updateVibe(this.value)"></div>
            <div class="slider-group"><div class="slider-label">Budget <span class="slider-val" id="val-b">Mitte</span></div><input type="range" id="budget-slider" min="1" max="3" value="2" oninput="updateBudget(this.value)"></div>
            <div class="slider-group"><div class="slider-label">Distanz <span class="slider-val" id="val-d">Nachbarreiche</span></div><input type="range" id="distance-slider" min="1" max="4" value="2" oninput="updateDistance(this.value)"></div>
        </div>
        <button class="oracle-btn" id="ask-oracle">BEFRAGEN</button>
    </div>
</div>

<footer><a href="impressum.html">Impressum</a><a href="datenschutz.html">Datenschutz</a></footer>

<script>
    const vibeNamen = ["Stille Einkehr", "Fließende Balance", "Abenteuerliche Ekstase"];
    const budgetNamen = ["Genügsamkeit", "Goldene Mitte", "Königlicher Luxus"];
    const distanzNamen = ["Heimatliche Gefilde", "Nachbarreiche", "Kontinentale Weite", "Ans Ende der Welt"];

    function updateVibe(v) { document.getElementById('val-v').innerText = vibeNamen[v-1]; }
    function updateBudget(v) { document.getElementById('val-b').innerText = budgetNamen[v-1]; }
    function updateDistance(v) { document.getElementById('val-d').innerText = distanzNamen[v-1]; }

    document.addEventListener('DOMContentLoaded', () => {
        initVisuals();
        const wrapper = document.getElementById('zodiac-wrapper');
        const askButton = document.getElementById('ask-oracle');

        const signs = [
            { name: 'Widder', icon: '♈' }, { name: 'Stier', icon: '♉' }, { name: 'Zwillinge', icon: '♊' }, { name: 'Krebs', icon: '♋' },
            { name: 'Löwe', icon: '♌' }, { name: 'Jungfrau', icon: '♍' }, { name: 'Waage', icon: '♎' }, { name: 'Skorpion', icon: '♏' },
            { name: 'Schütze', icon: '♐' }, { name: 'Steinbock', icon: '♑' }, { name: 'Wassermann', icon: '♒' }, { name: 'Fische', icon: '♓' }
        ];

        let selectedSigns = [];

        signs.forEach((sign, index) => {
            const ball = document.createElement('div');
            ball.className = 'zodiac-ball';
            const fontSize = sign.name.length > 9 ? '0.6rem' : '0.75rem';
            ball.innerHTML = `<span><b style="font-size:1.3rem">${sign.icon}</b><br><span style="font-size:${fontSize}">${sign.name}</span></span>`;
            
            const angle = (index / signs.length) * 2 * Math.PI - Math.PI / 2;
            const radius = 43; 
            const x = 50 + radius * Math.cos(angle);
            const y = 50 + radius * Math.sin(angle);
            
            ball.style.left = `${x}%`;
            ball.style.top = `${y}%`;

            ball.onclick = () => {
                ball.classList.toggle('selected');
                if (ball.classList.contains('selected')) selectedSigns.push(sign.name);
                else selectedSigns = selectedSigns.filter(s => s !== sign.name);
            };
            wrapper.appendChild(ball);
        });

        askButton.onclick = async () => {
            if (selectedSigns.length === 0) return;
            askButton.innerText = "LESEN...";
            const payload = {
                signs: selectedSigns,
                participants: document.getElementById('participants').value,
                vibe: vibeNamen[document.getElementById('vibe-slider').value - 1],
                budget: budgetNamen[document.getElementById('budget-slider').value - 1],
                distance: distanzNamen[document.getElementById('distance-slider').value - 1]
            };
            try {
                const response = await fetch('/api/match', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                sessionStorage.setItem('orakelResult', JSON.stringify({ result }));
                window.location.href = 'reise.html';
            } catch (e) { askButton.innerText = "BEFRAGEN"; }
        };
    });

    function initVisuals() {
        // Sterne
        const canvas = document.getElementById('space-canvas');
        for(let i=0; i<100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2;
            star.style.width = size + 'px'; star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%'; star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 5 + 's';
            canvas.appendChild(star);
        }
        // Fäden
        const svg = document.getElementById('magic-threads');
        let paths = '';
        const colors = ['#d4af37', '#8E6CF6', '#a3c2ff'];
        for(let i=0; i<15; i++) {
            const color = colors[Math.floor(Math.random() * colors.length)];
            const d = `M ${Math.random()*100} -10 C ${Math.random()*100} ${Math.random()*100}, ${Math.random()*100} ${Math.random()*100}, ${Math.random()*100} 110`;
            paths += `<path class="snaking-thread" d="${d}" stroke="${color}" stroke-width="0.1" style="animation-duration: ${40+Math.random()*30}s; animation-delay: -${Math.random()*20}s;" />`;
        }
        svg.innerHTML = paths;
    }
</script>
</body>
</html>
