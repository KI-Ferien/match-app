<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Deine Reise</title>
    <style>
        body { background: #05060f; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #333; max-width: 500px; }
        .btn { display: block; background: #d4af37; color: black; padding: 15px; text-decoration: none; text-align: center; border-radius: 10px; margin-top: 15px; }
    </style>
</head>
<body>
    <div id="content">Lade Bestimmung...</div>
    <script>
        const rawData = sessionStorage.getItem('orakelResult');
        const data = JSON.parse(rawData);
        const result = data.result || data;

        const ort = result.destination || result.ort || "Unbekannt";
        const text = result.explanation || result.astro_matching_grund || "Keine Info.";
        const url = `https://www.klook.com/de/?aid=492044`; // Stabile URL

        document.getElementById('content').innerHTML = `
            <div class="card">
                <h2>${ort}</h2>
                <p>${text}</p>
                <a href="${url}" class="btn">Ferien entdecken</a>
            </div>
        `;
    </script>
</body>
</html>
