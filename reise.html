<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deine Bestimmung - KI-Ferien.de</title>
    <style>
        :root {
            --sunrise-orange: #ff7e5f;
            --sunrise-peach: #feb47b;
            --ocean-blue: #005c97;
            --gold: #d4af37;
            --glass: rgba(255, 255, 255, 0.88);
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(180deg, var(--sunrise-orange) 0%, var(--sunrise-peach) 35%, #86d3f4 70%, var(--ocean-blue) 100%);
            color: #1a1a1a;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Verlangsamte Wellen-Animation */
        .waves-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 180px;
            z-index: -1;
            pointer-events: none;
        }

        .wave {
            position: absolute;
            bottom: 0;
            width: 200%;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none"><path d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V120H0V95.8C51.31,103.52,112.83,117.01,169,105,214.76,95.24,264.61,66.93,321.39,56.44Z" fill="rgba(255,255,255,0.4)"/></svg>');
            background-size: 50% 100%;
            animation: move-wave 25s linear infinite; /* Deutlich langsamer */
        }

        .wave:nth-child(2) {
            opacity: 0.6;
            animation: move-wave 18s linear infinite; /* Deutlich langsamer */
            bottom: 15px;
        }

        @keyframes move-wave {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            flex: 1;
            z-index: 1;
        }

        .result-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            padding: 50px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.5);
        }

        h1 {
            font-size: 2.8rem;
            color: var(--ocean-blue);
            margin: 0 0 20px 0;
            text-align: center;
            font-weight: 800;
        }

        #destExp {
            font-size: 1.2rem;
            line-height: 1.8;
            color: #2c3e50;
            margin: 30px 0;
            text-align: left;
        }

        #bestTimeTip {
            white-space: pre-line;
            background: rgba(212, 175, 55, 0.12);
            padding: 25px;
            border-radius: 24px;
            font-style: italic;
            border-left: 8px solid var(--gold);
            margin: 35px 0;
            color: #444;
        }

        .packlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin: 40px 0;
        }

        .pack-item {
            background: white;
            padding: 18px;
            border-radius: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            text-align: center;
            border: 1px solid #f0f0f0;
            font-weight: 500;
        }

        .affiliate-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 40px;
        }

        .affiliate-btn {
            background: var(--ocean-blue);
            color: white;
            padding: 20px;
            text-decoration: none;
            border-radius: 60px;
            text-align: center;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 92, 151, 0.2);
            font-size: 1.1rem;
        }

        .affiliate-btn:hover {
            background: #004471;
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(0, 92, 151, 0.3);
        }

        footer {
            padding: 50px 20px;
            text-align: center;
            font-size: 0.95rem;
            color: white;
            background: rgba(0,0,0,0.15);
            margin-top: auto;
        }

        footer a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            opacity: 0.8;
        }

        footer a:hover { opacity: 1; text-decoration: underline; }

        @media (max-width: 600px) {
            .result-card { padding: 35px 20px; }
            h1 { font-size: 2.1rem; }
        }
    </style>
</head>
<body>

<div class="waves-container">
    <div class="wave"></div>
    <div class="wave"></div>
</div>

<div class="container">
    <div class="result-card">
        <h1 id="destName">Berechne Bestimmung...</h1>
        <p id="destExp"></p>

        <div id="bestTimeTip"></div>

        <h3 style="color: var(--ocean-blue); text-align:center; margin-top:40px;">Die kosmische Packliste</h3>
        <div class="packlist-grid" id="packlist"></div>

        <div class="affiliate-section" id="affiliate-links"></div>

        <div style="text-align: center; margin-top: 45px;">
            <a href="index.html" style="color: var(--ocean-blue); font-weight: bold; text-decoration: none;">← Neue Ferien planen</a>
        </div>
    </div>
</div>

<footer>
    <p>&copy; 2026 KI-Ferien.de – Ferien-Orakel</p>
    <div style="margin-top: 10px;">
        <a href="impressum.html">Impressum</a>
        <a href="datenschutz.html">Datenschutz</a>
    </div>
</footer>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const dataString = sessionStorage.getItem('orakelResult');
        if (!dataString) {
            window.location.href = 'index.html';
            return;
        }

        const { result } = JSON.parse(dataString);

        // Daten füllen
        document.getElementById('destName').textContent = result.destination;
        document.getElementById('destExp').textContent = result.explanation;
        
        // Umbruch für beste Reisezeit
        const timeTipEl = document.getElementById('bestTimeTip');
        timeTipEl.textContent = "Die ideale Zeit für Deine Ferien:\n" + result.bestTimeTip;

        // Packliste rendern
        const packlistContainer = document.getElementById('packlist');
        packlistContainer.innerHTML = '';
        result.packliste.forEach(item => {
            const div = document.createElement('div');
            div.className = 'pack-item';
            div.textContent = '☀️ ' + item;
            packlistContainer.appendChild(div);
        });

        // Alle 3 Affiliate Links rendern
        const affContainer = document.getElementById('affiliate-links');
        if (result.affiliate_suggestions && result.affiliate_suggestions.length > 0) {
            affContainer.innerHTML = '';
            result.affiliate_suggestions.forEach(link => {
                const a = document.createElement('a');
                a.href = link.affiliate_url;
                a.className = 'affiliate-btn';
                a.target = '_blank';
                a.rel = 'noopener noreferrer';
                a.textContent = link.label;
                affContainer.appendChild(a);
            });
        }
    });
</script>

</body>
</html>
