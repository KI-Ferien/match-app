<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deine Kosmische Reise - KI-Ferien.de</title>
    <style>
        :root { --gold: #d4af37; --glass-border: rgba(212, 175, 55, 0.2); }
        body { margin: 0; padding: 0; background: #05060f; color: white; font-family: 'Optima', 'Segoe UI', serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        .nebula { position: fixed; top: 30%; left: 50%; width: 120vmax; height: 120vmax; background: radial-gradient(circle at center, rgba(142, 108, 246, 0.08) 0%, rgba(0, 92, 151, 0.03) 40%, transparent 70%); transform: translate(-50%, -50%); z-index: -2; pointer-events: none; filter: blur(100px); }
        .container { max-width: 600px; width: 90%; margin: 40px auto; z-index: 10; display: flex; flex-direction: column; gap: 25px; }
        .header { text-align: center; margin-bottom: 10px; }
        .back-btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 8px 18px; border-radius: 20px; cursor: pointer; text-transform: uppercase; }
        h1 { font-size: 2rem; color: var(--gold); margin: 15px 0 5px 0; }
        .vibe-card { background: rgba(10, 25, 47, 0.6); border: 1px solid var(--glass-border); padding: 25px; border-radius: 20px; text-align: center; }
        .vibe-card p { font-style: italic; font-size: 1.2rem; margin: 0; }
        .destination-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; padding: 30px; display: flex; flex-direction: column; gap: 20px; }
        .dest-meta { border-bottom: 1px solid rgba(212,175,55,0.1); padding-bottom: 12px; }
        .dest-title { font-size: 1.5rem; color: var(--gold); font-weight: bold; margin: 0; }
        .dest-reason { font-size: 1rem; color: rgba(255,255,255,0.8); line-height: 1.6; margin: 0; }
        .booking-btn { background: linear-gradient(135deg, #d4af37 0%, #aa841b 100%); color: black; text-decoration: none; text-align: center; padding: 15px; border-radius: 16px; font-weight: bold; display: block; }
        .error-msg { text-align: center; color: #ff6b6b; padding: 40px; font-size: 1.2rem; }
        footer { margin-top: auto; padding: 15px; text-align: center; width: 100%; }
        footer a { color: rgba(255,255,255,0.4); text-decoration: none; margin: 0 10px; font-size: 0.75rem; }
    </style>
</head>
<body>
<div class="nebula"></div>
<div class="container">
    <div class="header">
        <button class="back-btn" onclick="window.location.href='index.html'">← Zurück</button>
        <h1>Dein Kosmisches Ziel</h1>
    </div>
    <div id="vibe-container"></div>
    <div id="results-wrapper"></div>
</div>
<footer><a href="impressum.html">Impressum</a><a href="datenschutz.html">Datenschutz</a></footer>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const wrapper = document.getElementById('results-wrapper');
        const vibeContainer = document.getElementById('vibe-container');
        const rawData = sessionStorage.getItem('orakelResult');

        if (!rawData) {
            wrapper.innerHTML = '<div class="error-msg">Keine Daten empfangen. Bitte befrage das Orakel erneut.</div>';
            return;
        }

        try {
            const parsed = JSON.parse(rawData);
            // Wir lesen die Daten exakt so aus, wie dein ursprüngliches Setup sie bereitgestellt hat
            const data = parsed.result;

            if (data.vibe_keynote) {
                vibeContainer.innerHTML = `<div class="vibe-card"><p>"${data.vibe_keynote}"</p></div>`;
            }

            if (data.destinationen && data.destinationen.length > 0) {
                data.destinationen.forEach(dest => {
                    const card = document.createElement('div');
                    card.className = 'destination-card';
                    const encodedOrt = encodeURIComponent(dest.ort);
                    const klookUrl = `https://www.klook.com/de/search/result/?keyword=${encodedOrt}&aid=492044`;

                    card.innerHTML = `
                        <div class="dest-meta"><div class="dest-title">${dest.ort}</div></div>
                        <p class="dest-reason">${dest.astro_matching_grund}</p>
                        <a href="${klookUrl}" target="_blank" rel="noopener noreferrer" class="booking-btn" data-type="${dest.link_type || 'in_app_browser'}">
                            Ferien in ${dest.ort.split(',')[0]} entdecken ✨
                        </a>
                    `;
                    wrapper.appendChild(card);
                });
            } else {
                wrapper.innerHTML = '<div class="error-msg">Mistral konnte keine passenden Ziele finden.</div>';
            }
        } catch (e) {
            console.error("Fehler beim Auslesen:", e);
            wrapper.innerHTML = '<div class="error-msg">Ein Fehler ist aufgetreten. Bitte versuche es erneut.</div>';
        }
    });
</script>
</body>
</html>
