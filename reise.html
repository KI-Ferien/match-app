<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deine Bestimmung - KI-Ferien.de</title>
    <style>
        :root {
            --sunrise-glow: #ff9e2c;
            --ocean-blue: #005c97;
            --sand-light: #f4e4bc;
            --text-dark: #1a1a1a;
            --gold: #d4af37;
        }

        body {
            margin: 0;
            padding: 0;
            /* Sonnenaufgang-Gradient */
            background: linear-gradient(180deg, #ff7e5f 0%, #feb47b 30%, #86d3f4 60%, var(--ocean-blue) 100%);
            color: var(--text-dark);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Dynamische Wellen-Animation */
        .waves-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 150px;
            z-index: -1;
        }

        .wave {
            position: absolute;
            bottom: 0;
            width: 200%;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none"><path d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V120H0V95.8C51.31,103.52,112.83,117.01,169,105,214.76,95.24,264.61,66.93,321.39,56.44Z" fill="rgba(255,255,255,0.3)"/></svg>');
            background-size: 50% 100%;
            animation: move-wave 12s linear infinite;
        }

        .wave:nth-child(2) {
            opacity: 0.5;
            animation: move-wave 8s linear infinite;
            bottom: 10px;
        }

        @keyframes move-wave {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .container {
            max-width: 850px;
            margin: 60px auto;
            padding: 20px;
            flex: 1;
        }

        .result-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 50px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            border: 1px solid white;
        }

        h1 {
            font-size: 2.8rem;
            color: var(--ocean-blue);
            margin: 0;
            text-align: center;
        }

        #destExp {
            font-size: 1.15rem;
            line-height: 1.8;
            color: #333;
            margin: 30px 0;
        }

        /* FIX: Zeilenumbruch */
        #bestTimeTip {
            white-space: pre-line;
            background: rgba(212, 175, 55, 0.15);
            padding: 25px;
            border-radius: 20px;
            font-style: italic;
            border-left: 6px solid var(--gold);
            margin: 30px 0;
        }

        .packlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 40px 0;
        }

        .pack-item {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
            border: 1px solid #eee;
        }

        .affiliate-section {
            display: grid;
            gap: 15px;
        }

        .affiliate-btn {
            background: var(--ocean-blue);
            color: white;
            padding: 18px;
            text-decoration: none;
            border-radius: 50px;
            text-align: center;
            font-weight: bold;
            transition: transform 0.3s, background 0.3s;
            box-shadow: 0 4px 15px rgba(0, 92, 151, 0.3);
        }

        .affiliate-btn:hover {
            background: #004471;
            transform: translateY(-2px);
        }

        footer {
            padding: 40px;
            text-align: center;
            font-size: 0.9rem;
            color: white;
            background: rgba(0,0,0,0.2);
            margin-top: auto;
        }

        footer a {
            color: white;
            margin: 0 10px;
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .result-card { padding: 30px 15px; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

<div class="waves-container">
    <div class="wave"></div>
    <div class="wave"></div>
</div>

<div class="container">
    <div class="result-card">
        <h1 id="destName">Deine Bestimmung</h1>
        <p id="destExp"></p>

        <div id="bestTimeTip"></div>

        <h3 style="color: var(--ocean-blue); text-align:center;">Die kosmische Packliste</h3>
        <div class="packlist-grid" id="packlist"></div>

        <div class="affiliate-section" id="affiliate-links"></div>

        <div style="text-align: center; margin-top: 40px;">
            <a href="index.html" style="color: var(--ocean-blue); font-weight: bold;">← Andere Ferien orakeln</a>
        </div>
    </div>
</div>

<footer>
    <p>&copy; 2026 KI-Ferien.de – Dein Orakel für besondere Reisen.</p>
    <a href="impressum.html">Impressum</a> | <a href="datenschutz.html">Datenschutz</a>
</footer>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const dataString = sessionStorage.getItem('orakelResult');
        if (!dataString) {
            window.location.href = 'index.html';
            return;
        }

        const { result } = JSON.parse(dataString);

        // Daten füllen
        document.getElementById('destName').textContent = result.destination;
        document.getElementById('destExp').textContent = result.explanation;
        
        // FIX: Umbruch sicherstellen
        const timeTipEl = document.getElementById('bestTimeTip');
        timeTipEl.textContent = "Der perfekte Moment für Deine Ferien:\n" + result.bestTimeTip;

        // Packliste rendern
        const packlistContainer = document.getElementById('packlist');
        packlistContainer.innerHTML = '';
        result.packliste.forEach(item => {
            const div = document.createElement('div');
            div.className = 'pack-item';
            div.textContent = '🏖️ ' + item;
            packlistContainer.appendChild(div);
        });

        // Alle Affiliate Links (dynamisch)
        const affContainer = document.getElementById('affiliate-links');
        if (result.affiliate_suggestions) {
            affContainer.innerHTML = '';
            result.affiliate_suggestions.forEach(link => {
                const a = document.createElement('a');
                a.href = link.affiliate_url;
                a.className = 'affiliate-btn';
                a.target = '_blank';
                a.rel = 'noopener noreferrer';
                a.textContent = link.label;
                affContainer.appendChild(a);
            });
        }
    });
</script>

</body>
</html>
