<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KI-Ferien</title>
  
  <link rel="icon" type="image/x-icon" href="favicon.ico?v=3" />
  <link rel="stylesheet" href="reise.css" />
</head>
<body>
  
  <div id="beach-scene">
    <div class="sky-layer">
      <div class="sun-glow"></div>
    </div>
    <div class="ocean-layer">
      <div class="glimmer-path"></div>
      <div class="waves-container">
        <div class="wave wave1"></div>
        <div class="wave wave2"></div>
      </div>
    </div>
  </div>

  <main id="resultApp">
    <div class="glass-container">
      
      <header class="result-hero">
        <p class="pre-title">Einatmen. Ausatmen. Die Ferien beginnen.</p>
        <h1 id="destTitle">Deine Empfehlung</h1>
        <p id="destSub" class="muted"></p>
      </header>

      <section id="resultCard">
        <article id="explanation" class="oracle-text"></article>
        
        <div id="meta" class="meta-grid">
          <div class="meta-box">
            <span class="meta-icon">🌊</span>
            <strong>Beste Zeit</strong>
            <span id="bestTime" class="meta-value"></span>
          </div>
          <div class="meta-box">
            <span class="meta-icon">🎒</span>
            <strong>Ausrüstung</strong>
            <ul id="packlist"></ul>
          </div>
        </div>

        <div id="ctaRow">
          <button id="primaryCta" class="primary">Erlebnisse entdecken</button>
        </div>

        <div class="divider"></div>
        
        <h3 class="affiliate-title">Dein direkter Weg dorthin</h3>
        <div id="affiliateCards" class="cards"></div>

        <footer class="disclosure" style="margin-top: 40px; text-align: center; border-top: 1px solid rgba(227, 168, 105, 0.2); padding-top: 20px;">
          <small style="color: #94a3b8; display: block; margin-bottom: 10px;">
            KI-Ferien.de – Hinweis: Wir erhalten ggf. eine Provision. Keine Mehrkosten für dich.
          </small>
          <div style="font-size: 0.8rem;">
            <a href="impressum.html" style="color: #4B6584; text-decoration: underline; margin: 0 10px;">Impressum</a>
            <a href="datenschutz.html" style="color: #4B6584; text-decoration: underline; margin: 0 10px;">Datenschutz</a>
          </div>
          <p style="font-size: 0.7rem; color: #cbd5e1; margin-top: 15px;">&copy; 2026 KI-Ferien</p>
        </footer>

      </section>
    </div>
  </main>

  <script src="reise.js" type="module"></script>
</body>
</html>
