<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deine Analyse | KI-Ferien.de</title>
    <style>
        :root { 
            --glow: #0096ff; 
            --gold: #ffcc00; 
            --bg: #02050a; 
            --btn-bg: #d4af37; 
        }
        body { 
            background: var(--bg); color: white; font-family: 'Helvetica Neue', Arial, sans-serif; 
            display: flex; flex-direction: column; align-items: center; padding: 50px 20px; 
            min-height: 100vh; overflow-x: hidden; position: relative;
        }

        /* --- ATMOSPHÄRISCHER HINTERGRUND --- */
        .deep-space { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #0a1e3b 0%, #02050a 100%); z-index: -4; }
        
        .nebula {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 15% 25%, rgba(0, 150, 255, 0.2), transparent 45%),
                radial-gradient(circle at 85% 75%, rgba(120, 0, 255, 0.15), transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(0, 100, 255, 0.12), transparent 65%);
            filter: blur(110px); z-index: -3; animation: nebulaFlow 25s infinite alternate ease-in-out;
        }
        @keyframes nebulaFlow { from { transform: scale(1) rotate(0deg); } to { transform: scale(1.15) rotate(4deg); } }

        .stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(1px 1px at 25px 35px, #fff, transparent),
                radial-gradient(1.5px 1.5px at 160px 260px, #fff, transparent),
                radial-gradient(1px 1px at 410px 110px, #fff, transparent),
                radial-gradient(2px 2px at 65% 35%, #fff, transparent),
                radial-gradient(1.2px 1.2px at 85% 75%, #fff, transparent);
            background-size: 320px 320px; opacity: 0.65; z-index: -2; animation: twinkle 6s infinite alternate;
        }
        @keyframes twinkle { from { opacity: 0.45; } to { opacity: 0.85; } }

        /* --- CONTAINER --- */
        .teaser-box { 
            position: relative; z-index: 10; max-width: 720px; width: 100%; text-align: center; 
            background: rgba(255,255,255,0.02); padding: 45px; border-radius: 40px;
            border: 1px solid rgba(0, 150, 255, 0.25); backdrop-filter: blur(25px);
            box-shadow: 0 35px 70px rgba(0,0,0,0.8);
        }
        
        .ai-badge { color: var(--glow); font-size: 0.7rem; font-weight: bold; letter-spacing: 2px; margin-bottom: 12px; display: block; }
        h1 { font-size: 1.6rem; color: white; margin-bottom: 25px; letter-spacing: 1px; }

        .zodiac-tags { display: flex; gap: 12px; justify-content: center; margin-bottom: 35px; flex-wrap: wrap; }
        .tag { padding: 7px 18px; border: 1px solid var(--gold); border-radius: 5px; color: var(--gold); font-weight: bold; font-size: 0.85rem; text-transform: uppercase; background: rgba(255, 204, 0, 0.05); }

        .dest-image { 
            width: 100%; height: 380px; border-radius: 20px; overflow: hidden; 
            margin-bottom: 30px; border: 1px solid rgba(0, 150, 255, 0.3); background: #000;
            box-shadow: 0 0 25px rgba(0, 150, 255, 0.2);
        }
        .dest-image img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 1.8s ease; }
        .dest-image img.visible { opacity: 0.85; }

        .result-title { color: var(--glow); font-size: 2.2rem; font-weight: bold; margin-bottom: 15px; display: block; text-shadow: 0 0 15px var(--glow); }
        .result-text { line-height: 1.75; font-size: 1.1rem; opacity: 0.95; margin: 0 auto 35px; max-width: 580px; }

        /* --- DYNAMISCHER HOCHGLANZ-BUTTON --- */
        .action-area { margin: 30px 0; display: none; border-bottom: 1px solid rgba(255,255,255,0.12); padding-bottom: 30px; }
        .btn-klook { 
            background: var(--btn-bg); color: black; font-size: 1.1rem; font-weight: bold; 
            padding: 18px 45px; border: none; border-radius: 50px; cursor: pointer; 
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.4); text-decoration: none;
            display: inline-block; transition: 0.3s all ease; letter-spacing: 1px;
            text-transform: uppercase;
        }
        .btn-klook:hover { transform: scale(1.03); box-shadow: 0 4px 25px var(--btn-bg); filter: brightness(1.1); }

        .back-link { margin-top: 20px; display: inline-block; color: var(--glow); text-decoration: none; font-weight: bold; font-size: 0.95rem; transition: 0.3s; }
        .back-link:hover { color: var(--gold); text-shadow: 0 0 8px var(--gold); }
    </style>
</head>
<body>

    <div class="deep-space"></div>
    <div class="nebula"></div>
    <div class="stars"></div>

    <div class="teaser-box">
        <span class="ai-badge">KI-ENGINE AKTIV (MISTRAL)</span>
        <h1>Deine Kosmische Ferien-Analyse</h1>
        
        <div class="zodiac-tags" id="tag-box"></div>

        <div class="dest-image">
            <img id="main-img" src="" alt="Zielgebietsvorschau">
        </div>

        <div class="content">
            <span class="result-title" id="res-title">Lade Konstellation...</span>
            <p class="result-text" id="res-text">Die KI berechnet das optimale Ziel für eure Energien.</p>
        </div>

        <div class="action-area" id="klook-box">
            <a href="#" id="link-klook" target="_blank" rel="noopener noreferrer" class="btn-klook">Aktivitäten & Hotels entdecken</a>
        </div>

        <a href="index.html" class="back-link">← Neue Suche starten</a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const signs = (params.get('signs') || "").split(',').filter(Boolean);
        const vibe = parseInt(params.get('v') || 50);

        const tagBox = document.getElementById('tag-box');
        signs.forEach(s => {
            const tag = document.createElement('div');
            tag.className = 'tag';
            tag.innerText = s.toUpperCase();
            tagBox.appendChild(tag);
        });

        setTimeout(() => {
            try {
                const title = document.getElementById('res-title');
                const text = document.getElementById('res-text');
                const img = document.getElementById('main-img');
                const klookBox = document.getElementById('klook-box');
                const klookLink = document.getElementById('link-klook');

                const firstSign = (signs[0] || 'widder').toLowerCase().trim();

                // Logik-Mapping: 'url' leitet jetzt direkt auf die sauberen Klook-Zielseiten weiter!
                const presets = {
                    widder: { t: "Vulkane Islands", url: "https://www.klook.com/de/city/207-iceland-things-to-do/", d: "Pure Action und Naturgewalten für deinen Tatendrang.", i: "https://images.unsplash.com/photo-1476610182048-b716b8518aae?w=800" },
                    stier: { t: "Toskana Genuss", url: "https://www.klook.com/de/coastline/112-tuscany-things-to-do/", d: "Sinnliche Hügellandschaften und erstklassige Wellness.", i: "https://images.unsplash.com/photo-1534445867742-43195f401b6c?w=800" },
                    zwillinge: { t: "Tokio Metropole", url: "https://www.klook.com/de/city/28-tokyo-things-to-do/", d: "Unendliche Inspiration und pulsierendes Stadtleben.", i: "https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?w=800" },
                    krebs: { t: "Cornwall Küste", url: "https://www.klook.com/de/city/3649-cornwall-things-to-do/", d: "Romantische Cottages und Geborgenheit am wilden Meer.", i: "https://images.unsplash.com/photo-1510253451774-67f781f8f782?w=800" },
                    loewe: { t: "Safari Namibia", url: "https://www.klook.com/de/country/145-namibia-things-to-do/", d: "Majestätische Weite und Luxus unter afrikanischen Sternen.", i: "https://images.unsplash.com/photo-1516426122078-c23e76319801?w=800" },
                    jungfrau: { t: "Schweizer Alpen", url: "https://www.klook.com/de/country/103-switzerland-things-to-do/", d: "Klarheit, Wandern und perfekte Bergstille.", i: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=800" },
                    waage: { t: "Santorini Design", url: "https://www.klook.com/de/city/1301-santorini-things-to-do/", d: "Ästhetik pur zwischen azurblauem Meer und weißen Mauern.", i: "https://images.unsplash.com/photo-1570077188670-e3a8d69ac5ff?w=800" },
                    skorpion: { t: "Marrakesch Mystik", url: "https://www.klook.com/de/city/1020-marrakech-things-to-do/", d: "Geheimnisvolle Gassen und intensive Sinneserlebnisse.", i: "https://images.unsplash.com/photo-1539020140153-e479b8c22e70?w=800" },
                    schuetze: { t: "Patagonien Freiheit", url: "https://www.klook.com/de/city/2747-punta-arenas-things-to-do/", d: "Grenzenlose Expeditionen am Ende der Welt.", i: "https://images.unsplash.com/photo-1513407030348-c983a97b98d8?w=800" },
                    steinbock: { t: "Südtirol Gipfel", url: "https://www.klook.com/de/city/3748-trentino-alto-adige-things-to-do/", d: "Beständigkeit und Erfolg in den höchsten Höhen.", i: "https://images.unsplash.com/photo-1533560225433-87593c6f9664?w=800" },
                    wassermann: { t: "Lappland Vision", url: "https://www.klook.com/de/city/549-rovaniemi-things-to-do/", d: "Unkonventionelle Nächte im Glas-Iglu unter Polarlichtern.", i: "https://images.unsplash.com/photo-1531366930075-410a88094957?w=800" },
                    fische: { t: "Bali Träume", url: "https://www.klook.com/de/city/31-bali-things-to-do/", d: "Spirituelle Heilung und Magie am Indischen Ozean.", i: "https://images.unsplash.com/photo-1537996194471-e657df975ab4?w=800" }
                };

                let choice = presets[firstSign] || { t: "Dein kosmisches Ziel", url: "https://www.klook.com/de/", d: "Das Orakel hat ein Ziel generiert, das perfekt zu eurer Konstellation passt.", i: "https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?w=800" };
                
                if (vibe > 80) {
                    choice = { t: "Queenstown", url: "https://www.klook.com/de/city/47-queenstown-things-to-do/", d: "Euer Vibe-Level steht auf Maximum! Dies ist der ultimative Ort für Adrenalin.", i: "https://images.unsplash.com/photo-1589802829985-817e51181b92?w=800" };
                }

                // UI Texte & Bild setzen
                title.innerText = choice.t;
                text.innerText = choice.d;
                img.src = choice.i;
                img.onload = () => img.classList.add('visible');

                // Jetzt hängen wir deine Tracking-ID sicher an die feste Klook-Zielseite an
                if (klookLink) {
                    klookLink.href = `${choice.url}?aid=492044`;
                    klookBox.style.display = 'block'; 
                }
            } catch (err) {
                console.error("Fehler im Timeout-Block:", err);
            }
        }, 1600);
    </script>
</body>
</html>
