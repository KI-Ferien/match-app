<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deine Kosmische Reise - KI-Ferien.de</title>
    <style>
        :root {
            --gold: #d4af37;
            --cosmic-blue: #0a192f;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(212, 175, 55, 0.2);
        }

        body {
            margin: 0; padding: 0;
            background: #05060f;
            color: white; font-family: 'Optima', 'Segoe UI', serif;
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; overflow-x: hidden;
        }

        /* HINTERGRUND-ELEMENTE */
        .nebula {
            position: fixed; top: 30%; left: 50%; width: 120vmax; height: 120vmax;
            background: radial-gradient(circle at center, rgba(142, 108, 246, 0.08) 0%, rgba(0, 92, 151, 0.03) 40%, transparent 70%);
            transform: translate(-50%, -50%); z-index: -2; pointer-events: none; filter: blur(100px);
        }

        .container {
            max-width: 600px; width: 90%; margin: 40px auto; z-index: 10;
            display: flex; flex-direction: column; gap: 25px;
        }

        /* HEADER */
        .header { text-align: center; margin-bottom: 10px; }
        .back-btn {
            background: transparent; border: 1px solid var(--gold); color: var(--gold);
            padding: 8px 18px; border-radius: 20px; cursor: pointer; font-size: 0.85rem;
            transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;
        }
        .back-btn:hover { background: var(--gold); color: black; }

        h1 { font-size: clamp(1.6rem, 5vw, 2.5rem); color: var(--gold); margin: 15px 0 5px 0; text-shadow: 0 0 20px rgba(212,175,55,0.3); }
        
        /* KEYNOTE CARD */
        .vibe-card {
            background: rgba(10, 25, 47, 0.6); backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); padding: 25px; border-radius: 20px;
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .vibe-card p { font-style: italic; font-size: clamp(1rem, 3vw, 1.3rem); color: #fff; margin: 0; line-height: 1.5; }

        /* DESTINATION CARDS */
        .destination-card {
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.05); border-radius: 24px;
            padding: 30px; display: flex; flex-direction: column; gap: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6); transition: transform 0.3s ease;
        }
        .destination-card:hover { border-color: var(--glass-border); }

        .dest-meta { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(212,175,55,0.1); padding-bottom: 12px; }
        .dest-title { font-size: clamp(1.3rem, 4vw, 1.8rem); color: var(--gold); font-weight: bold; margin: 0; }
        
        .dest-reason { font-size: clamp(0.9rem, 2.5vw, 1.05rem); color: rgba(255,255,255,0.8); line-height: 1.6; margin: 0; }

        /* PREMIUM BUTTON (KLOOK) */
        .booking-btn {
            background: linear-gradient(135deg, #d4af37 0%, #aa841b 100%);
            color: black; text-decoration: none; text-align: center;
            padding: 15px; border-radius: 16px; font-weight: bold;
            font-size: 1rem; cursor: pointer; transition: 0.3s;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2);
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .booking-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(212, 175, 55, 0.4); }

        /* ERROR / EMPTY STATE */
        .no-data { text-align: center; padding: 40px; color: rgba(255,255,255,0.5); }

        footer { margin-top: auto; padding: 15px; width: 100%; text-align: center; box-sizing: border-box; }
        footer a { color: rgba(255,255,255,0.4); text-decoration: none; margin: 0 10px; font-size: 0.75rem; }
    </style>
</head>
<body>

<div class="nebula"></div>

<div class="container">
    <div class="header">
        <button class="back-btn" onclick="window.location.href='index.html'">← Zurück zum Orakel</button>
        <h1 id="page-title">Deine Bestimmung</h1>
    </div>

    <div id="vibe-container"></div>

    <div id="results-wrapper">
        <div class="no-data">Das Schicksal wird geladen...</div>
    </div>
</div>

<footer>
    <a href="impressum.html">Impressum</a>
    <a href="datenschutz.html">Datenschutz</a>
</footer>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const rawData = sessionStorage.getItem('orakelResult');
        const wrapper = document.getElementById('results-wrapper');
        const vibeContainer = document.getElementById('vibe-container');
        const pageTitle = document.getElementById('page-title');

        if (!rawData) {
            wrapper.innerHTML = '<div class="no-data">Keine Daten vom Orakel empfangen. Bitte starte die Befragung erneut.</div>';
            return;
        }

        try {
            const parsed = JSON.parse(rawData);
            // Der Match-Endpunkt liefert das JSON verschachtelt in result oder result.result
            const data = parsed.result?.result ? parsed.result.result : parsed.result;

            if (!data || !data.destinationen || data.destinationen.length === 0) {
                wrapper.innerHTML = '<div class="no-data">Die Sterne sind unklar. Bitte versuche es noch einmal.</div>';
                return;
            }

            // 1. Vibe Keynote setzen
            if (data.vibe_keynote) {
                vibeContainer.innerHTML = `
                    <div class="vibe-card">
                        <p>" ${data.vibe_keynote} "</p>
                    </div>
                `;
            }

            // Titel dynamisch anpassen, falls Sternzeichen-Infos mitgesendet werden
            if (sessionStorage.getItem('orakelResult')) {
                pageTitle.innerText = "Dein Kosmisches Ziel";
            }

            // 2. Destinationen rendern (Reine Klook-Anbindung, absolut KEIN Welcome Pickups)
            wrapper.innerHTML = ''; // Clear loading state
            
            data.destinationen.forEach(dest => {
                const card = document.createElement('div');
                card.className = 'destination-card';

                // Klook Affiliate URL generieren mit deiner ID 492044
                const encodedOrt = encodeURIComponent(dest.ort);
                const klookUrl = `https://www.klook.com/de/search/result/?keyword=${encodedOrt}&aid=492044`;

                card.innerHTML = `
                    <div class="dest-meta">
                        <div class="dest-title">${dest.ort}</div>
                    </div>
                    <p class="dest-reason">${dest.astro_matching_grund}</p>
                    <a href="${klookUrl}" 
                       target="_blank" 
                       rel="noopener noreferrer" 
                       class="booking-btn"
                       data-type="${dest.link_type || 'in_app_browser'}">
                       Erlebnisse in ${dest.ort.split(',')[0]} entdecken ✨
                    </a>
                `;
                
                wrapper.appendChild(card);
            });

        } catch (e) {
            console.error("Fehler beim Verarbeiten der Orakel-Daten:", e);
            wrapper.innerHTML = '<div class="no-data">Fehler bei der kosmischen Übertragung.</div>';
        }
    });
</script>
</body>
</html>
