<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deine Bestimmung - KI-Ferien.de</title>
    <style>
        :root { --sunrise: #ff7e5f; --ocean: #005c97; --gold: #d4af37; }
        body {
            margin: 0; padding: 0; background: linear-gradient(180deg, var(--sunrise) 0%, #feb47b 30%, #86d3f4 65%, var(--ocean) 100%);
            color: #1a1a1a; font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden;
        }
        .waves-container { position: fixed; bottom: 0; width: 100%; height: 150px; z-index: -1; }
        .wave {
            position: absolute; bottom: 0; width: 200%; height: 100%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none"><path d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V120H0V95.8C51.31,103.52,112.83,117.01,169,105,214.76,95.24,264.61,66.93,321.39,56.44Z" fill="rgba(255,255,255,0.4)"/></svg>');
            background-size: 50% 100%; animation: move-wave 50s linear infinite;
        }
        @keyframes move-wave { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .container { width: 95%; max-width: 800px; margin: 30px auto; flex: 1; z-index: 1; box-sizing: border-box; }
        .result-card { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-radius: 30px; padding: clamp(20px, 5vw, 40px); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { font-size: clamp(1.5rem, 6vw, 2.5rem); color: var(--ocean); text-align: center; }
        #bestTimeTip { white-space: pre-line; background: rgba(212,175,55,0.1); padding: 20px; border-radius: 15px; border-left: 5px solid var(--gold); margin: 20px 0; }
        .packlist-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin: 20px 0; }
        .pack-item { background: white; padding: 12px; border-radius: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .affiliate-section { display: flex; flex-direction: column; gap: 10px; margin-top: 30px; }
        .affiliate-btn { background: var(--ocean); color: white; padding: 18px; text-decoration: none; border-radius: 50px; text-align: center; font-weight: bold; }
        footer { padding: 30px; text-align: center; font-size: 0.8rem; color: white; background: rgba(0,0,0,0.1); }
        footer a { color: white; margin: 0 10px; text-decoration: none; }
    </style>
</head>
<body>
    <div class="waves-container"><div class="wave"></div></div>
    <div class="container">
        <div class="result-card">
            <h1 id="destName">...</h1>
            <p id="destExp" style="line-height:1.7; text-align:justify;"></p>
            <div id="bestTimeTip"></div>
            <div class="packlist-grid" id="packlist"></div>
            <div id="affiliate-links" class="affiliate-section"></div>
            <div style="text-align: center; margin-top: 30px;"><a href="index.html" style="color:var(--ocean); text-decoration:none; font-weight:bold;">← Zurück</a></div>
        </div>
    </div>
    <footer><p>&copy; 2026 KI-Ferien.de</p><a href="impressum.html">Impressum</a> | <a href="datenschutz.html">Datenschutz</a></footer>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const dataString = sessionStorage.getItem('orakelResult');
            if (!dataString) return;
            const { result } = JSON.parse(dataString);
            document.getElementById('destName').textContent = result.destination;
            document.getElementById('destExp').textContent = result.explanation;
            document.getElementById('bestTimeTip').textContent = "Beste Zeit:\n" + result.bestTimeTip;
            const packContainer = document.getElementById('packlist');
            result.packliste.forEach(item => {
                const div = document.createElement('div');
                div.className = 'pack-item'; div.textContent = '🏖️ ' + item;
                packContainer.appendChild(div);
            });
            const affContainer = document.getElementById('affiliate-links');
            result.affiliate_suggestions.forEach(link => {
                const a = document.createElement('a');
                a.href = link.affiliate_url; a.className = 'affiliate-btn';
                a.target = '_blank'; a.textContent = link.label;
                affContainer.appendChild(a);
            });
        });
    </script>
</body>
</html>
