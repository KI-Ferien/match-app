<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deine Bestimmung - KI-Ferien.de</title>
    <style>
        :root {
            --sunrise: #ff7e5f; --peach: #feb47b;
            --ocean: #005c97; --gold: #d4af37;
        }

        body {
            margin: 0; padding: 0;
            background: linear-gradient(180deg, var(--sunrise) 0%, var(--peach) 30%, #86d3f4 65%, var(--ocean) 100%);
            color: #1a1a1a; font-family: 'Segoe UI', sans-serif;
            min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden;
        }

        .waves-container {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 200px;
            z-index: -1; pointer-events: none;
        }

        .wave {
            position: absolute; bottom: 0; width: 200%; height: 100%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none"><path d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V120H0V95.8C51.31,103.52,112.83,117.01,169,105,214.76,95.24,264.61,66.93,321.39,56.44Z" fill="rgba(255,255,255,0.4)"/></svg>');
            background-size: 50% 100%;
            animation: move-wave 50s linear infinite;
        }

        .wave:nth-child(2) { opacity: 0.6; animation: move-wave 35s linear infinite; bottom: 15px; }

        @keyframes move-wave { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .container { max-width: 800px; margin: 40px auto; padding: 20px; flex: 1; z-index: 1; }

        .result-card {
            background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(15px);
            border-radius: 40px; padding: 45px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); border: 1px solid white;
        }

        h1 { font-size: 2.8rem; color: var(--ocean); margin: 0 0 20px 0; text-align: center; }

        #destExp { font-size: 1.15rem; line-height: 1.8; color: #2c3e50; margin: 25px 0; text-align: justify; }

        #bestTimeTip {
            white-space: pre-line; background: rgba(212, 175, 55, 0.12);
            padding: 25px; border-radius: 24px; font-style: italic;
            border-left: 8px solid var(--gold); margin: 30px 0; color: #444;
        }

        .packlist-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin: 30px 0; }
        .pack-item { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); text-align: center; }

        .affiliate-section { display: flex; flex-direction: column; gap: 12px; margin-top: 35px; }

        .affiliate-btn {
            background: var(--ocean); color: white; padding: 18px; text-decoration: none;
            border-radius: 50px; text-align: center; font-weight: bold; transition: all 0.3s ease;
            box-shadow: 0 6px 15px rgba(0, 92, 151, 0.2);
        }
        .affiliate-btn:hover { background: #004471; transform: translateY(-3px); }

        footer { padding: 40px 20px; text-align: center; font-size: 0.9rem; color: white; background: rgba(0,0,0,0.1); margin-top: auto; }
        footer a { color: white; margin: 0 10px; text-decoration: none; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="waves-container"><div class="wave"></div><div class="wave"></div></div>
    <div class="container">
        <div class="result-card">
            <h1 id="destName">Suche Bestimmung...</h1>
            <p id="destExp"></p>
            <div id="bestTimeTip"></div>
            <h3 style="color: var(--ocean); text-align:center;">Die Reise-Ausrüstung</h3>
            <div class="packlist-grid" id="packlist"></div>
            <div id="affiliate-links" class="affiliate-section"></div>
            <div style="text-align: center; margin-top: 40px;">
                <a href="index.html" style="color: var(--ocean); font-weight: bold; text-decoration: none;">← Neue Ferien planen</a>
            </div>
        </div>
    </div>
    <footer>
        <p>&copy; 2026 KI-Ferien.de</p>
        <a href="impressum.html">Impressum</a> | <a href="datenschutz.html">Datenschutz</a>
    </footer>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const dataString = sessionStorage.getItem('orakelResult');
            if (!dataString) { window.location.href = 'index.html'; return; }
            const { result } = JSON.parse(dataString);
            document.getElementById('destName').textContent = result.destination;
            document.getElementById('destExp').textContent = result.explanation;
            const timeTipEl = document.getElementById('bestTimeTip');
            timeTipEl.textContent = "Die ideale Zeit für Deine Ferien:\n" + result.bestTimeTip;
            const packlistContainer = document.getElementById('packlist');
            packlistContainer.innerHTML = '';
            result.packliste.forEach(item => {
                const div = document.createElement('div');
                div.className = 'pack-item'; div.textContent = '🏖️ ' + item;
                packlistContainer.appendChild(div);
            });
            const affContainer = document.getElementById('affiliate-links');
            if (result.affiliate_suggestions) {
                affContainer.innerHTML = '';
                result.affiliate_suggestions.forEach(link => {
                    const a = document.createElement('a');
                    a.href = link.affiliate_url; a.className = 'affiliate-btn';
                    a.target = '_blank'; a.rel = 'noopener noreferrer'; a.textContent = link.label;
                    affContainer.appendChild(a);
                });
            }
        });
    </script>
</body>
</html>
