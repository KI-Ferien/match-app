<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deine Bestimmung - KI-Ferien.de</title>
    <style>
        :root {
            --sunrise: #ff7e5f; --peach: #feb47b;
            --ocean: #005c97; --gold: #d4af37;
        }

        body {
            margin: 0; padding: 0;
            background: linear-gradient(180deg, var(--sunrise) 0%, var(--peach) 30%, #86d3f4 65%, var(--ocean) 100%);
            color: #1a1a1a; font-family: 'Segoe UI', sans-serif;
            min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden;
        }

        /* WELLEN ANIMATION */
        .waves-container { position: fixed; bottom: 0; left: 0; width: 100%; height: 160px; z-index: -1; }
        .wave {
            position: absolute; bottom: 0; width: 200%; height: 100%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none"><path d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V120H0V95.8C51.31,103.52,112.83,117.01,169,105,214.76,95.24,264.61,66.93,321.39,56.44Z" fill="rgba(255,255,255,0.4)"/></svg>');
            background-size: 50% 100%; animation: move-wave 45s linear infinite;
        }
        @keyframes move-wave { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .container { width: 92%; max-width: 800px; margin: 40px auto; flex: 1; z-index: 1; }

        .result-card {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px);
            border-radius: 40px; padding: clamp(25px, 5vw, 50px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 1px solid white;
        }

        h1 { font-size: clamp(1.8rem, 6vw, 2.8rem); color: var(--ocean); text-align: center; margin: 0 0 20px 0; }
        #destExp { font-size: 1.1rem; line-height: 1.7; text-align: justify; }

        #bestTimeTip {
            white-space: pre-line; background: rgba(212, 175, 55, 0.1);
            padding: 20px; border-radius: 20px; border-left: 6px solid var(--gold); margin: 30px 0;
        }

        .packlist-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin: 20px 0; }
        .pack-item { background: white; padding: 12px; border-radius: 12px; text-align: center; box-shadow: 0 3px 6px rgba(0,0,0,0.05); }

        /* TEILEN SEKTION */
        .share-section {
            margin: 30px 0; padding: 20px; background: rgba(0, 92, 151, 0.05);
            border-radius: 25px; text-align: center;
        }
        .share-buttons { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 10px; }
        
        .share-btn {
            padding: 10px 20px; border-radius: 20px; border: none; font-weight: bold;
            cursor: pointer; transition: 0.3s; font-size: 0.9rem; display: flex; align-items: center; gap: 8px;
            text-decoration: none;
        }
        .btn-copy { background: var(--gold); color: black; }
        .btn-whatsapp { background: #25D366; color: white; }

        .affiliate-section { display: flex; flex-direction: column; gap: 12px; margin-top: 30px; }
        .affiliate-btn {
            background: var(--ocean); color: white; padding: 18px; text-decoration: none;
            border-radius: 50px; text-align: center; font-weight: bold; transition: 0.3s;
        }

        footer { padding: 40px; text-align: center; font-size: 0.85rem; color: white; background: rgba(0,0,0,0.1); }
        footer a { color: white; margin: 0 10px; text-decoration: none; }
    </style>
</head>
<body>
    <div class="waves-container"><div class="wave"></div></div>
    <div class="container">
        <div class="result-card">
            <h1 id="destName">Lädt...</h1>
            <p id="destExp"></p>
            
            <div id="bestTimeTip"></div>

            <h3 style="text-align:center; color: var(--ocean);">Kosmisches Reisegepäck</h3>
            <div class="packlist-grid" id="packlist"></div>

            <div class="share-section">
                <span style="font-weight: bold; color: var(--ocean);">Schicksal teilen</span>
                <div class="share-buttons">
                    <button class="share-btn btn-copy" onclick="copyResult()">📋 Kopieren</button>
                    <a id="whatsapp-link" href="#" class="share-btn btn-whatsapp" target="_blank">🟢 WhatsApp</a>
                </div>
            </div>

            <div id="affiliate-links" class="affiliate-section"></div>
            
            <div style="text-align: center; margin-top: 40px;">
                <a href="index.html" style="color: var(--ocean); font-weight: bold; text-decoration: none;">← Neue Ferien orakeln</a>
            </div>
        </div>
    </div>
    <footer>
        <a href="impressum.html">Impressum</a> | <a href="datenschutz.html">Datenschutz</a>
    </footer>

    <script>
        let shareText = "";

        document.addEventListener('DOMContentLoaded', () => {
            const data = JSON.parse(sessionStorage.getItem('orakelResult'));
            if (!data) return;
            const res = data.result;
            
            document.getElementById('destName').textContent = res.destination;
            document.getElementById('destExp').textContent = res.explanation;
            document.getElementById('bestTimeTip').textContent = "Die ideale Zeit:\n" + res.bestTimeTip;
            
            const pack = document.getElementById('packlist');
            res.packliste.forEach(item => {
                const div = document.createElement('div');
                div.className = 'pack-item'; div.textContent = '🏖️ ' + item;
                pack.appendChild(div);
            });

            const aff = document.getElementById('affiliate-links');
            res.affiliate_suggestions.forEach(link => {
                const a = document.createElement('a');
                a.href = link.affiliate_url; a.className = 'affiliate-btn';
                a.target = '_blank'; a.textContent = link.label;
                aff.appendChild(a);
            });

            // Share Text vorbereiten
            shareText = `Das Orakel hat gesprochen! Meine Bestimmung sind Ferien in ${res.destination}. 🌌✨\n\nBefrage auch du die Sterne auf: https://ki-ferien.de`;
            
            // WhatsApp Link aktualisieren
            document.getElementById('whatsapp-link').href = `https://api.whatsapp.com/send?text=${encodeURIComponent(shareText)}`;
        });

        function copyResult() {
            navigator.clipboard.writeText(shareText).then(() => {
                const btn = document.querySelector('.btn-copy');
                const original = btn.innerText;
                btn.innerText = "✅ Kopiert!";
                setTimeout(() => btn.innerText = original, 2000);
            });
        }
    </script>
</body>
</html>
