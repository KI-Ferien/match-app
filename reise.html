<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deine Bestimmung - KI-Ferien</title>
    <style>
        :root { --delphi-gold: #d4af37; --space-dark: #0a0b1e; --star-white: #ffffff; }
        body {
            margin: 0; background: var(--space-dark); color: white;
            font-family: 'Segoe UI', Roboto, sans-serif; overflow-x: hidden; min-height: 100vh;
        }
        #space-background { position: fixed; width: 100%; height: 100%; z-index: -2; top: 0; left: 0; }
        #magic-threads { position: fixed; width: 100%; height: 100%; z-index: -1; pointer-events: none; top: 0; left: 0; }
        
        .container { max-width: 800px; margin: 40px auto; padding: 20px; position: relative; }
        .result-card {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 24px;
            padding: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }
        h1 { color: var(--delphi-gold); font-size: 2.8em; margin-top: 0; text-shadow: 0 0 15px rgba(212,175,55,0.4); }
        
        #destExp { font-size: 1.15em; line-height: 1.7; color: #e0e0e0; margin: 25px 0; }
        
        /* FIX: Zeilenumbruch für die beste Reisezeit */
        #bestTimeTip { 
            white-space: pre-line; line-height: 1.6; color: #a3c2ff;
            background: rgba(163, 194, 255, 0.1); padding: 20px;
            border-radius: 12px; border-left: 4px solid #a3c2ff; margin: 30px 0;
        }

        .packlist-container { margin: 30px 0; }
        #packlist { columns: 2; list-style-type: none; padding: 0; }
        #packlist li { margin-bottom: 10px; padding-left: 20px; position: relative; }
        #packlist li::before { content: '✦'; position: absolute; left: 0; color: var(--delphi-gold); }

        .affiliate-btn {
            display: block; margin: 12px 0; padding: 18px;
            background: rgba(212, 175, 55, 0.08); border: 1px solid var(--delphi-gold);
            color: white; text-decoration: none; border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); text-align: center;
            font-weight: 600; letter-spacing: 0.5px;
        }
        .affiliate-btn:hover {
            background: var(--delphi-gold); color: black;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.5); transform: translateY(-3px);
        }

        /* ANIMATIONS */
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 4s infinite ease-in-out; }
        
        @keyframes snake {
            0% { stroke-dashoffset: 400; opacity: 0; }
            15% { opacity: 0.8; }
            85% { opacity: 0.8; }
            100% { stroke-dashoffset: 0; opacity: 0; }
        }
        .snaking-thread { fill: none; stroke-dasharray: 200; animation: snake linear infinite; }
    </style>
</head>
<body>
    <div id="space-background"></div>
    <svg id="magic-threads" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>

    <div class="container">
        <div class="result-card">
            <h1 id="destName">Suche Ziel...</h1>
            <p id="destExp"></p>
            
            <div id="bestTimeTip"></div>

            <div class="packlist-container">
                <h3 style="color: var(--delphi-gold);">Deine kosmische Ausrüstung:</h3>
                <ul id="packlist"></ul>
            </div>

            <div id="affiliate-links"></div>
            
            <div style="text-align: center; margin-top: 40px;">
                <a href="index.html" style="color: rgba(255,255,255,0.4); text-decoration: none; font-size: 0.9em;">
                    ← Eine neue Reise orakeln
                </a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const dataString = sessionStorage.getItem('orakelResult');
            if (!dataString) { window.location.href = 'index.html'; return; }

            const { result } = JSON.parse(dataString);

            // 1. Daten füllen
            document.getElementById('destName').textContent = result.destination;
            document.getElementById('destExp').textContent = result.explanation;
            
            // FIX: Umbruch und Beschriftung
            const timeTipEl = document.getElementById('bestTimeTip');
            timeTipEl.textContent = "Der günstigste Moment für Deine Ferien:\n" + result.bestTimeTip;

            // 2. Packliste
            const listUl = document.getElementById('packlist');
            listUl.innerHTML = '';
            result.packliste.forEach(item => {
                const li = document.createElement('li');
                li.textContent = item;
                listUl.appendChild(li);
            });

            // 3. Alle 3 Affiliate Links dynamisch rendern
            const affContainer = document.getElementById('affiliate-links');
            if (affContainer && result.affiliate_suggestions) {
                affContainer.innerHTML = '';
                result.affiliate_suggestions.forEach(link => {
                    const a = document.createElement('a');
                    a.href = link.affiliate_url;
                    a.className = 'affiliate-btn';
                    a.target = '_blank';
                    a.rel = 'noopener noreferrer';
                    a.textContent = link.label;
                    affContainer.appendChild(a);
                });
            }

            initVisualEffects();
        });

        function initVisualEffects() {
            const bg = document.getElementById('space-background');
            for(let i=0; i < 120; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 2 + 0.5;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 8 + 's';
                bg.appendChild(star);
            }

            const svg = document.getElementById('magic-threads');
            let paths = '';
            const colors = ['#d4af37', '#8E6CF6', '#a3c2ff', '#ff7a59'];
            for(let i=0; i < 18; i++) {
                const color = colors[Math.floor(Math.random() * colors.length)];
                const d = `M ${Math.random()*120 - 10} -10 C ${Math.random()*120} ${Math.random()*100}, ${Math.random()*120} ${Math.random()*100}, ${Math.random()*120 - 10} 110`;
                paths += `<path class="snaking-thread" d="${d}" stroke="${color}" stroke-width="0.15" style="animation-duration: ${30 + Math.random()*50}s; animation-delay: -${Math.random()*30}s;" />`;
            }
            svg.innerHTML = paths;
        }
    </script>
</body>
</html>
